<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AF Braga — Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="header-brand">
        <span class="header-badge">AF Braga</span>
        <h1 class="header-title">Flashcards</h1>
      </div>
      <p class="header-sub">Preparação para exames de árbitro</p>
    </header>

    <main class="main">
      <!-- Home: deck picker -->
      <section class="view view--home" id="view-home">
        <h2 class="section-label">Escolher baralho</h2>
        <div class="deck-grid" id="deck-grid"></div>
      </section>

      <!-- Study mode -->
      <section class="view view--study hidden" id="view-study">
        <div class="study-top">
          <button class="btn-ghost" id="btn-back" type="button" aria-label="Voltar aos baralhos">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Baralhos
          </button>
          <div class="study-meta">
            <span class="deck-name" id="study-deck-name"></span>
            <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-stats">
              <span id="stat-remaining">0 restantes</span>
              <span class="stat-sep">·</span>
              <span id="stat-reviewed">0 revistas hoje</span>
            </div>
          </div>
        </div>

        <div class="card-stage">
          <div class="flashcard" id="flashcard" tabindex="0" role="button" aria-label="Virar carta">
            <div class="flashcard-inner" id="flashcard-inner">
              <div class="flashcard-face flashcard-front">
                <span class="card-number" id="card-number"></span>
                <p class="card-question" id="card-question"></p>
                <ul class="options-list options-list--front" id="options-list-front"></ul>
                <p class="flip-hint">
                  <kbd>Espaço</kbd> ou toque para <strong>Virar</strong>
                </p>
              </div>
              <div class="flashcard-face flashcard-back">
                <span class="card-number" id="card-number-back"></span>
                <div class="answer-reveal">
                  <span class="answer-letter" id="answer-letter"></span>
                  <p class="answer-text" id="answer-text"></p>
                </div>
                <ul class="options-list" id="options-list"></ul>
              </div>
            </div>
          </div>
        </div>

        <div class="rating-panel hidden" id="rating-panel">
          <p class="rating-label">Como foi?</p>
          <div class="rating-buttons">
            <button class="rate-btn rate-btn--again" data-rating="again" type="button">
              <span class="rate-name">Novamente</span>
              <kbd>1</kbd>
            </button>
            <button class="rate-btn rate-btn--hard" data-rating="hard" type="button">
              <span class="rate-name">Difícil</span>
              <kbd>2</kbd>
            </button>
            <button class="rate-btn rate-btn--good" data-rating="good" type="button">
              <span class="rate-name">Bom</span>
              <kbd>3</kbd>
            </button>
            <button class="rate-btn rate-btn--easy" data-rating="easy" type="button">
              <span class="rate-name">Fácil</span>
              <kbd>4</kbd>
            </button>
          </div>
        </div>

        <div class="session-done hidden" id="session-done">
          <h2 class="done-title">Sessão concluída</h2>
          <p class="done-text" id="done-text"></p>
          <button class="btn-primary" id="btn-done-home" type="button">Voltar aos baralhos</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Repetição espaçada · dados locais no navegador</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
